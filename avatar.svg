<svg width="100%" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="200" height="200" fill="#1a0b2e" rx="14"/>
  <rect x="4" y="4" width="192" height="192" fill="none" stroke="#00f0ff" stroke-width="2" rx="10"/>

  <g shape-rendering="crispEdges">
    <!-- pixel grid character: a simple 8-bit style robot/avatar built from squares -->
    <rect x="70" y="40" width="60" height="10" fill="#ff2fd0"/>
    <rect x="60" y="50" width="80" height="10" fill="#ff2fd0"/>
    <rect x="60" y="60" width="10" height="10" fill="#ff2fd0"/>
    <rect x="130" y="60" width="10" height="10" fill="#ff2fd0"/>
    <rect x="70" y="60" width="20" height="10" fill="#0f0620"/>
    <rect x="110" y="60" width="20" height="10" fill="#0f0620"/>
    <rect x="90" y="60" width="20" height="10" fill="#ff2fd0"/>

    <rect x="60" y="70" width="10" height="10" fill="#ff2fd0"/>
    <rect x="70" y="70" width="20" height="10" fill="#00f0ff"/>
    <rect x="90" y="70" width="20" height="10" fill="#ff2fd0"/>
    <rect x="110" y="70" width="20" height="10" fill="#00f0ff"/>
    <rect x="130" y="70" width="10" height="10" fill="#ff2fd0"/>

    <rect x="60" y="80" width="80" height="10" fill="#ff2fd0"/>

    <rect x="50" y="90" width="10" height="40" fill="#9d4edd"/>
    <rect x="140" y="90" width="10" height="40" fill="#9d4edd"/>
    <rect x="60" y="90" width="80" height="50" fill="#3a1f66"/>

    <rect x="80" y="100" width="15" height="15" fill="#00f0ff"/>
    <rect x="105" y="100" width="15" height="15" fill="#00f0ff"/>

    <rect x="60" y="140" width="30" height="10" fill="#ff2fd0"/>
    <rect x="110" y="140" width="30" height="10" fill="#ff2fd0"/>
    <rect x="60" y="150" width="30" height="20" fill="#0f0620"/>
    <rect x="110" y="150" width="30" height="20" fill="#0f0620"/>
  </g>

  <text x="100" y="190" text-anchor="middle" font-family="Trebuchet MS, sans-serif" font-size="11" fill="#00f0ff">PLAYER ONE</text>
</svg>
