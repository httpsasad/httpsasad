<svg width="100%" viewBox="0 0 900 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0"/>
      <stop offset="50%" stop-color="#d4af37" stop-opacity="1"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8a7530"/>
      <stop offset="35%" stop-color="#8a7530"/>
      <stop offset="50%" stop-color="#fff3c4"/>
      <stop offset="65%" stop-color="#8a7530"/>
      <stop offset="100%" stop-color="#8a7530"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-1.5 0" to="1.5 0" dur="5s" repeatCount="indefinite"/>
    </linearGradient>

    <linearGradient id="borderflow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0"/>
      <stop offset="48%" stop-color="#d4af37" stop-opacity="0"/>
      <stop offset="50%" stop-color="#fff3c4" stop-opacity="0.9"/>
      <stop offset="52%" stop-color="#d4af37" stop-opacity="0"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-2 0" to="2 0" dur="5s" repeatCount="indefinite"/>
    </linearGradient>

    <radialGradient id="bgglow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#3a2f10" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#3a2f10" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="dust" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#f2d675" stop-opacity="1"/>
      <stop offset="100%" stop-color="#f2d675" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="wavefill1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="wavefill2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f2d675" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#f2d675" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="900" height="240" fill="#0a0a0a"/>

  <ellipse cx="450" cy="120" rx="260" ry="90" fill="url(#bgglow)">
    <animate attributeName="rx" values="260;300;260" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="6s" repeatCount="indefinite"/>
  </ellipse>

  <g>
    <circle cx="120" cy="200" r="1.6" fill="url(#dust)">
      <animate attributeName="cy" values="200;40;200" dur="9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.9;0" dur="9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="250" cy="210" r="1.2" fill="url(#dust)">
      <animate attributeName="cy" values="210;30;210" dur="11s" begin="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="11s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="650" cy="205" r="1.4" fill="url(#dust)">
      <animate attributeName="cy" values="205;35;205" dur="10s" begin="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.9;0" dur="10s" begin="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="780" cy="195" r="1.8" fill="url(#dust)">
      <animate attributeName="cy" values="195;25;195" dur="8s" begin="0.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="8s" begin="0.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="500" cy="215" r="1.3" fill="url(#dust)">
      <animate attributeName="cy" values="215;45;215" dur="10.5s" begin="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="10.5s" begin="4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <rect x="1" y="1" width="898" height="238" fill="none" stroke="#d4af37" stroke-width="1" opacity="0.35"/>
  <rect x="1" y="1" width="898" height="238" fill="none" stroke="url(#borderflow)" stroke-width="1.5"/>
  <rect x="10" y="10" width="880" height="220" fill="none" stroke="#d4af37" stroke-width="0.5" opacity="0.2"/>

  <g stroke="#f2d675" stroke-width="1.5" fill="none">
    <path d="M 20,10 L 10,10 L 10,20">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="4s" repeatCount="indefinite"/>
    </path>
    <path d="M 880,10 L 890,10 L 890,20">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="4s" begin="1s" repeatCount="indefinite"/>
    </path>
    <path d="M 20,230 L 10,230 L 10,220">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="4s" begin="2s" repeatCount="indefinite"/>
    </path>
    <path d="M 880,230 L 890,230 L 890,220">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="4s" begin="3s" repeatCount="indefinite"/>
    </path>
  </g>

  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.2s" dur="1.4s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>

    <text x="450" y="70" text-anchor="middle" font-family="Georgia, serif" font-size="13" letter-spacing="6" fill="#d4af37">MACHINE LEARNING ENGINEER</text>

    <text x="450" y="130" text-anchor="middle" font-family="Georgia, serif" font-size="46" font-weight="400" fill="url(#flow)" letter-spacing="2">Muhammad Asad Akram</text>

    <text x="450" y="185" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#8a8a82" letter-spacing="2">COMPUTER VISION &#183; NLP &#183; FULL-STACK AI &#183; BAHAWALPUR, PK</text>

    <g font-family="Georgia, serif" font-size="11" fill="#6b6b62" letter-spacing="1">
      <text x="60" y="215">INTELLIXSOFT</text>
      <text x="780" y="215" text-anchor="end">EST. 2024</text>
    </g>
  </g>

  <line x1="390" y1="155" x2="510" y2="155" stroke="url(#goldline)" stroke-width="1" opacity="0">
    <animate attributeName="opacity" values="0;0.6;0" dur="5s" begin="1.6s" repeatCount="indefinite"/>
  </line>

  <!-- literal flowing water waves along the bottom edge -->
  <clipPath id="waveclip">
    <rect x="0" y="0" width="900" height="240"/>
  </clipPath>
  <g clip-path="url(#waveclip)">
    <path fill="url(#wavefill1)">
      <animate attributeName="d" dur="6s" repeatCount="indefinite"
        values="
          M0,225 C150,210 300,240 450,225 C600,210 750,240 900,225 L900,240 L0,240 Z;
          M0,230 C150,245 300,215 450,230 C600,245 750,215 900,230 L900,240 L0,240 Z;
          M0,225 C150,210 300,240 450,225 C600,210 750,240 900,225 L900,240 L0,240 Z" />
    </path>
    <path fill="url(#wavefill2)">
      <animate attributeName="d" dur="4.5s" begin="0.4s" repeatCount="indefinite"
        values="
          M0,232 C120,220 260,244 400,232 C560,218 700,244 900,230 L900,240 L0,240 Z;
          M0,228 C120,242 260,216 400,228 C560,244 700,216 900,232 L900,240 L0,240 Z;
          M0,232 C120,220 260,244 400,232 C560,218 700,244 900,230 L900,240 L0,240 Z" />
    </path>
  </g>
</svg>
